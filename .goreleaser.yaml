# GoReleaser config — see https://goreleaser.com
# Trigger: push a `v*.*.*` git tag; GitHub Actions runs `goreleaser release`.

version: 2

project_name: dust

before:
  hooks:
    - go mod tidy

builds:
  - id: dust
    main: ./cmd/dust
    binary: dust
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ariefsn/dust/internal/cli.version={{.Version}}
      - -X github.com/ariefsn/dust/internal/cli.commit={{.Commit}}
      - -X github.com/ariefsn/dust/internal/cli.date={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: dust
    # Predictable filenames so install.sh can fetch them by URL pattern.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "dust {{.Version}}"
  header: |
    ## What's new in {{.Tag}}

    See the full diff [here]({{.ReleaseURL}}).
  footer: |
    ---

    **Install with one command:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/ariefsn/dust/main/install.sh | bash
    ```

    Or download the binary for your platform below and drop it on your `$PATH`.
