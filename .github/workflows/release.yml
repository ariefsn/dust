name: release

# Triggered by pushing a `vX.Y.Z` tag. Run `make release-tag VERSION=vX.Y.Z`
# locally to push it.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # needed for goreleaser to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
